<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>myPATH — Contact Information</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<!-- Screen 3: Contact Information. Text fields pre-filled with fake data.
     Required interactions = Phone Type + PA county dropdowns. -->
<body data-prev="2-getting-started.html" data-next="4-income-sources.html">

  <header class="app-header">
    <h1>PA Personal Income Tax Return</h1>
  </header>

  <nav class="stepper" aria-label="Progress">
    <div class="step done"><span class="circle">&checkmark;</span><span class="label">Introduction</span></div>
    <div class="step done"><span class="circle">&checkmark;</span><span class="label">Identity Verification</span></div>
    <div class="step done"><span class="circle">&checkmark;</span><span class="label">Getting Started</span></div>
    <div class="step current"><span class="circle">&rsaquo;</span><span class="label">Contact Information</span></div>
  </nav>

  <main class="content">
    <div class="card-row">
      <!-- Name -->
      <section class="card">
        <h3>Name</h3>
        <div class="field">
          <span class="field-label">First name</span>
          <input class="text-input" type="text" value="DAISY" />
        </div>
        <div class="field">
          <span class="field-label">Middle name</span>
          <input class="text-input" type="text" value="" />
        </div>
        <div class="field">
          <span class="field-label">Last name</span>
          <input class="text-input" type="text" value="ADAMS" />
        </div>
        <div class="field">
          <span class="field-label">Suffix</span>
          <select class="dropdown">
            <option value="" selected></option>
            <option>Jr.</option>
            <option>Sr.</option>
            <option>II</option>
            <option>III</option>
          </select>
        </div>
      </section>

      <!-- Background -->
      <section class="card">
        <h3>Background</h3>
        <div class="field">
          <span class="field-label">Email</span>
          <input class="text-input" type="text" value="daisy.adams@example.com" />
        </div>
        <div class="field">
          <span class="field-label req">Occupation</span>
          <input class="text-input" type="text" value="SALES" />
        </div>
        <div class="field">
          <span class="field-label">SSN or ITIN</span>
          <input class="text-input" type="text" value="***-**-0100" />
        </div>
      </section>

      <!-- Primary Phone -->
      <section class="card">
        <h3>Primary Phone</h3>
        <div class="field">
          <span class="field-label">Country</span>
          <select class="dropdown">
            <option value="USA" selected>USA</option>
            <option value="Canada">Canada</option>
            <option value="Mexico">Mexico</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="field">
          <span class="field-label req">Type</span>
          <select class="dropdown" required>
            <option value="">Required</option>
            <option value="Mobile" selected>Mobile</option>
            <option value="Home">Home</option>
            <option value="Work">Work</option>
          </select>
        </div>
      </section>
    </div>

    <!-- Address -->
    <section class="card full">
      <h3>Address</h3>
      <div class="field" style="max-width: 480px;">
        <span class="field-label req">Address</span>
        <input class="text-input" type="text" value="123 Main St, Harrisburg, PA 17101" />
      </div>
      <button type="button" class="verify-btn">Verify address</button>
      <div class="field" style="max-width: 360px;">
        <span class="field-label req">Pennsylvania county in which you lived</span>
        <select class="dropdown" required>
          <option value="">Required</option>
          <option value="Adams">Adams</option>
          <option value="Allegheny">Allegheny</option>
          <option value="Bucks">Bucks</option>
          <option value="Chester">Chester</option>
          <option value="Dauphin" selected>Dauphin</option>
          <option value="Lancaster">Lancaster</option>
          <option value="Montgomery">Montgomery</option>
          <option value="Philadelphia">Philadelphia</option>
          <option value="York">York</option>
        </select>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-left">
      <button type="button" class="btn-text">Cancel</button>
      <button type="button" class="btn-text">Save Draft</button>
    </div>
    <div class="footer-right">
      <button type="button" class="btn-prev">&lsaquo; Previous</button>
      <button type="button" class="btn-next">Next &rsaquo;</button>
    </div>
  </footer>
  <div class="bottom-strip"></div>

  <script src="js/app.js"></script>
</body>
</html>
