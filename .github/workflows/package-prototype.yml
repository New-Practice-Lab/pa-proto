name: Package prototype

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'pa_proto/**'

# Needed so the workflow can create/update a Release and upload assets.
permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # `git archive` only includes tracked files, so anything matched by
      # .gitignore (or otherwise untracked) is automatically excluded.
      # The --prefix makes the zip extract into a `pa_proto/` folder.
      - name: Create pa_proto.zip
        run: git archive --format=zip --prefix=pa_proto/ --output pa_proto.zip HEAD:pa_proto

      # Publish the zip to a single, rolling "latest" release
      - name: Publish zip to the "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest pa_proto.zip --clobber
          else
            gh release create latest pa_proto.zip \
              --title "PA Prototype (latest)" \
              --notes "Download **pa_proto.zip** below, unzip it, and open \`pa_proto/index.html\`."
          fi
