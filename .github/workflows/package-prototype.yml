name: Package prototype

on:
  push:
    branches: [main]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # `git archive` only includes tracked files, so anything matched by
      # .gitignore (or otherwise untracked) is automatically excluded.
      # The --prefix makes the zip extract into a `pa_proto/` folder.
      - name: Create pa_proto.zip
        run: git archive --format=zip --prefix=pa_proto/ --output pa_proto.zip HEAD:pa_proto

      - name: Upload zip as a downloadable artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pa_proto
          path: pa_proto.zip
          if-no-files-found: error
